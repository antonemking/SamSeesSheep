[project]
name = "sheep-seg"
version = "0.1.0"
description = "Privacy-first computer vision for animal welfare on small farms"
requires-python = ">=3.11,<3.13"
license = "MIT"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "python-multipart>=0.0.9",
    "pillow>=10.0",
    "pillow-heif>=0.18",
    "opencv-python-headless>=4.9",
    "numpy>=1.26",
    "torch>=2.1",
    "torchvision>=0.16",
    "transformers>=4.40",
    "imageio[pyav]>=2.34",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "httpx>=0.27"]
