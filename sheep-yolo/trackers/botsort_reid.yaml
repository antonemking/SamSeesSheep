# BoT-SORT with ReID enabled — appearance-based association for spotted
# flocks where sheep cross/occlude and spatial-only tracking drops IDs.
# Ultralytics ships botsort.yaml with with_reid=False, which makes the
# default "BoT-SORT" effectively ByteTrack + motion comp (useless on a
# fixed camera). This file flips ReID on and uses detector-native
# features as the embedding source.

tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 30
match_thresh: 0.8
fuse_score: True

gmc_method: sparseOptFlow

proximity_thresh: 0.5
appearance_thresh: 0.8
with_reid: True
model: auto
